bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    filter_duration: 0.3
    default_server_timeout: 60 #20
    default_cancel_timeout: 50
    wait_for_service_timeout: 1000
    introspection_mode: "disabled"
    default_nav_through_poses_bt_xml: "/home/voiture/bolide_voiture/config_nav2/navigate_through_poses_ackermann.xml"
    default_nav_to_pose_bt_xml: "/home/voiture/bolide_voiture/config_nav2/navigate_to_pose_ackermann.xml"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1667
      search_window: 2.0
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1669
      search_window: 2.0
    bt_search_directories:
      - $(find-pkg-share nav2_bt_navigator)/behavior_trees
    error_code_name_prefixes:
      - backup
      - compute_path
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - smoother
      - wait



controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.50 # 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    path_handler_plugins: ["PathHandler"]
    use_realtime_priority: false
    speed_limit_topic: "speed_limit"

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.5 #m
      movement_time_allowance: 10.0 #s

    general_goal_checker:
      plugin: "nav2_controller::PositionGoalChecker"
      stateful: false
      xy_goal_tolerance: 1.0 #m
      path_length_tolerance: 1.0 #m

    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0
      enforce_path_inversion: true
      enforce_path_rotation: false
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.785
      reject_unit_path: false

    # --- Regulated Pure Pursuit Controller ---
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Vitesses limites
      desired_linear_vel: 1.2          # vitesse de croisière (m/s)
      max_linear_accel: 2.5            # accélération max (m/s²)
      max_linear_decel: 2.5            # décélération max (m/s²)

      # Lookahead
      lookahead_dist: 0.4              # distance lookahead fixe (m)
      min_lookahead_dist: 0.1          # lookahead minimum (m)
      max_lookahead_dist: 1.5          # lookahead maximum (m)
      lookahead_time: 1.5              # temps lookahead adaptatif (s)
      use_velocity_scaled_lookahead_dist: true  # lookahead dynamique selon vitesse

      # Rotation vers la cible (approach)
      rotate_to_heading_angular_vel: 0.0    # Ackermann : pas de rotation sur place
      rotate_to_heading_min_angle: 0.785    # ~45° — seuil pour forcer rotation
      use_rotate_to_heading: false           # DÉSACTIVÉ : Ackermann ne tourne pas sur place

      # Régulation de vitesse en courbe
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.3   # rayon en dessous duquel on ralentit
      regulated_linear_scaling_min_speed: 0.25   # vitesse min en courbe serrée

      # Régulation par proximité des obstacles
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0

      # Limites angulaires Ackermann
      max_angular_accel: 3.2
      min_approach_linear_velocity: 0.05

      # Tolérance de suivi du chemin
      transform_tolerance: 0.1
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # Direction
      allow_reversing: true            # passer à true si marche arrière supportée

      use_dynamic_window : true
      # allow_obstacle_checking_beyond_goal: true



local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 14.0
      publish_frequency: 7.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      always_send_full_costmap: true
      introspection_mode: "disabled"
      # Footprint polygonal (40x20 cm)
      # Format : [[avant_gauche], [avant_droite], [arrière_droite], [arrière_gauche]]
      footprint: "[[0.20, 0.10], [0.20, -0.10], [-0.20, -0.10], [-0.20, 0.10]]"
      plugins: ["obstacle_layer", "range_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.20
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: false
        topics: ["/range/ir_left", "/range/ir_right"]
        phi: 0.4
        clear_threshold: 0.1
        mark_threshold: 0.90
        clear_on_max_reading: true
        no_readings_timeout: 0.5





global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.20, 0.10], [0.20, -0.10], [-0.20, -0.10], [-0.20, 0.10]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.30
      always_send_full_costmap: true
      introspection_mode: "disabled"



planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    expected_planner_frequency: 2.0 #10.0
    allow_partial_planning: true
    costmap_update_timeout: 1.0
    introspection_mode: "disabled"

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"

      # Résolution angulaire (nombre de bins d'angle discrets)
      angle_quantization_bins: 72         # 5° par bin

      # Résolution de la carte analytique (hérite de la costmap si 0.0)
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false

      # Contrainte cinématique Ackermann
      minimum_turning_radius: 0.85        # rayon de braquage minimum (m)

      # Heuristique
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"  # ou "DUBIN" si marche arrière sinon REEDS_SHEPP

      # Coûts
      cost_travel_multiplier: 6.0
      angle_quantization_bins: 72

      # Lissage intégré (post-processing du chemin Hybrid A*)
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

      # Tolérance sur l'objectif
      tolerance: 1.0
      allow_unknown: true
      lookup_table_size: 10.0 #20.0
      debug_visualizations: false



smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      refinement_num: 2
      enforce_path_inversion: true
      do_refinement: true



behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait"]
    backup:
      plugin: "nav2_behaviors::BackUp"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.0
    min_rotational_vel: 0.0
    rotational_acc_lim: 0.0


waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    introspection_mode: "disabled"
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200


velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.0, 2.0]
    min_velocity: [-2.0, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


collision_monitor:
  ros__parameters:
    enabled: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_twist"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_height: 0.05
      max_height: 2.0
      enabled: true

map_server:
  ros__parameters:
    introspection_mode: "disabled"

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
    introspection_mode: "disabled"

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    dock_plugins: ["dummy_dock"]
    dummy_dock:
      plugin: "opennav_docking::SimpleChargingDock"
    docks: ["dummy_dock_instance"]
    dummy_dock_instance:
      type: "dummy_dock"
      frame: "map"
      pose: [0.0, 0.0, 0.0]
    introspection_mode: "disabled"

