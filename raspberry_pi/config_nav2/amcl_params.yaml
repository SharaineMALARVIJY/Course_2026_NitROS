amcl:
  ros__parameters:
    use_sim_time: false
    # Odometry noise
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.05

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    # Laser model
    laser_model_type: "likelihood_field"
    laser_max_range: 30.0
    laser_min_range: -1.0
    max_beams: 100

    # Particles
    max_particles: 3000
    min_particles: 500

    scan_topic: "scan"

    # Motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    set_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # TF output
    tf_broadcast: true
    transform_tolerance: 1.0

    # Filter tuning
    update_min_d: 0.20
    update_min_a: 0.2
    resample_interval: 1
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    pf_err: 0.05
    pf_z: 0.99
    sigma_hit: 0.2
    z_hit: 0.8
    z_rand: 0.2
    z_max: 0.05
    z_short: 0.05
    lambda_short: 0.1
    laser_likelihood_max_dist: 4.0
    save_pose_rate: 0.5

